name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Instalar plataforma Android 34 y build-tools
      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME 2>/dev/null || true

      # Apuntar Gradle al SDK del runner
      - name: Create local.properties
        working-directory: hse-app/android-app
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        working-directory: hse-app/android-app
        run: gradle assembleDebug --stacktrace

      - name: Prepare version info
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == v* ]]; then
            VERSION="$TAG"
          else
            VERSION="dev-$(date +%Y%m%d-%H%M)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "filename=HSE-Reporter-${VERSION}.apk" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp hse-app/android-app/app/build/outputs/apk/debug/app-debug.apk \
             "${{ steps.ver.outputs.filename }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.filename }}
          path: ${{ steps.ver.outputs.filename }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: HSE Reporter ${{ steps.ver.outputs.version }}
          body: |
            ## HSE Reporter ${{ steps.ver.outputs.version }}

            ### Instalación en Android
            1. Descargá el archivo **${{ steps.ver.outputs.filename }}**
            2. En el celular: Ajustes → Seguridad → Permitir fuentes desconocidas
            3. Abrí el APK y tocá Instalar

            ### Requisitos
            - Android 5.0 o superior
            - Conectado a la red WiFi de la central térmica
          files: ${{ steps.ver.outputs.filename }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
